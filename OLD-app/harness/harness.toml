# Nulqor Configuration

[server]
host = "localhost"
port = 8080

[lmstudio]
base_url = "http://localhost:1234/v1"
api_key = ""  # Optional, LM Studio doesn't require by default

[paths]
skills_dir = "../skills"
agents_dir = "../agents"
rules_dir = "../rules"
runs_dir = "./runs"

[defaults]
agent = "default"
model = ""  # Empty = autodetect from LM Studio

[generation]
temperature = 0.7
max_tokens = 2048
top_p = 0.9
top_k = 40

[tools]
# Built-in tools enabled by default
list_skills = true
load_skill = true
read_file = false
write_file = false
run_shell = false
