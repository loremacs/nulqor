[extension]
id             = "provider-lmstudio"
version        = "0.1.0"
kind           = "Provider"
api-version    = "v1"
schema-version = "1.0.0"
min-core       = "0.1.0"
http-hosts     = ["localhost"]

[[provides]]
capability = "provider"
instance   = "lmstudio"
contract   = "provider@1"

[[commands]]
id           = "lmstudio:connect@1"
owner        = "provider-lmstudio"
permission   = "read"
input-schema  = '{ "url": "string", "model": "string" }'
output-schema = '{ "ok": "boolean", "connected": "boolean", "active": "string", "nulqor_loaded": "boolean" }'

[[commands]]
id           = "lmstudio:disconnect@1"
owner        = "provider-lmstudio"
permission   = "read"
output-schema = '{ "ok": "boolean" }'

[[commands]]
id           = "lmstudio:select-model@1"
owner        = "provider-lmstudio"
permission   = "read"
input-schema  = '{ "model": "string" }'
output-schema = '{ "ok": "boolean", "active": "string", "nulqor_loaded": "boolean" }'

[[commands]]
id           = "lmstudio:stop-model@1"
owner        = "provider-lmstudio"
permission   = "read"
output-schema = '{ "ok": "boolean", "stopped": "boolean", "active": "string|null" }'

[[commands]]
id           = "lmstudio:unload-model@1"
owner        = "provider-lmstudio"
permission   = "read"
input-schema  = '{ "model": "string" }'
output-schema = '{ "ok": "boolean", "stopped": "boolean" }'

[[commands]]
id           = "lmstudio:loaded-models@1"
owner        = "provider-lmstudio"
permission   = "read"
input-schema  = '{ "refresh": "boolean?", "url": "string?" }'
output-schema = '{ "loaded": "array" }'

[[commands]]
id           = "lmstudio:models@1"
owner        = "provider-lmstudio"
permission   = "read"
input-schema  = '{ "refresh": "boolean?", "url": "string?" }'
output-schema = '{ "models": "array", "active": "string|null", "connected": "boolean", "nulqor_loaded_active": "boolean" }'

[[commands]]
id           = "lmstudio:generate@1"
owner        = "provider-lmstudio"
permission   = "write"
callable-by  = ["panel", "agent", "service"]
input-schema  = '{ "messages": "array", "model": "string?", "agent": "string?", "system_prompt": "string?", "temperature": "number?", "max_tokens": "number?" }'
output-schema = '{ "stream_id": "string" }'

[[publishes]]
id = "provider:stream-start@1"

[[publishes]]
id = "provider:stream-delta@1"

[[publishes]]
id = "provider:stream-done@1"

[[publishes]]
id = "provider:stream-error@1"
