<!doctype html>
<html lang="en" class="nulqor-startup-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nulqor</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        background-color: rgba(0, 0, 0, 0) !important;
      }

      html.nulqor-startup-hidden:not(.nulqor-startup-windowed),
      html.nulqor-startup-hidden:not(.nulqor-startup-windowed) body,
      html.nulqor-startup-hidden:not(.nulqor-startup-windowed) #app {
        opacity: 0 !important;
        pointer-events: none !important;
        background: transparent !important;
        background-color: transparent !important;
      }

      html.nulqor-startup-hidden.nulqor-startup-windowed,
      html.nulqor-startup-hidden.nulqor-startup-windowed body,
      html.nulqor-startup-hidden.nulqor-startup-windowed #app {
        opacity: 0 !important;
        pointer-events: none !important;
        background: #121216 !important;
        background-color: #121216 !important;
      }
    </style>
    <link rel="stylesheet" href="/extensions/host/ui/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/extensions/host/ui/main.ts"></script>
  </body>
</html>
