# Nulqor startup — shell loads host desk; panels open as tiles on the grid.
# Restart after changing enabled_extensions. Panel open/close is live in the Apps menu.

open_panels = ["hello-world", "clock-panel", "chat-panel"]

enabled_extensions = [
  "host",
  "hello-world",
  "clock-panel",
  "provider-lmstudio",
  "transcript",
  "session-store",
  "http-api",
  "chat-panel",
  "context-editor",
  "run-logger",
]

[shell]
cell_pixels = 64
snap_enabled = true
show_grid = true
click_through = true
always_on_top = false

# Full harness (MCP, skills, validation):
# enabled_extensions += ["hello-panel", "mcp-bridge", "skill-runner", "validation"]
